<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        h1 {
            margin-bottom: 20px;
        }
        input, select {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Customer Churn Prediction</h1>

        <form action="/predict" method="post">

            <!-- Numerical Feature -->
            <input type="number" step="any" name="tenure_yeo_trim" placeholder="Tenure (processed value)" required>

            <!-- Binary Features (0 or 1) -->
            <select name="gender_Male" required>
                <option value="">Gender</option>
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>

            <select name="Partner_Yes" required>
                <option value="">Partner</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="PhoneService_Yes" required>
                <option value="">Phone Service</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="Contract_One year" required>
                <option value="">Contract: One Year</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="Contract_Two year" required>
                <option value="">Contract: Two Year</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="PaperlessBilling_Yes" required>
                <option value="">Paperless Billing</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="PaymentMethod_Credit card (automatic)" required>
                <option value="">Credit Card (Auto)</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="PaymentMethod_Electronic check" required>
                <option value="">Electronic Check</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="PaymentMethod_Mailed check" required>
                <option value="">Mailed Check</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <button type="submit">Predict</button>
        </form>

        {% if Customer_Churn_Prediction_value is not none %}
            <div class="result">
                Prediction:
                {% if Customer_Churn_Prediction_value == 1 %}
                    Customer will Churn ❌
                {% else %}
                    Customer will Stay ✅
                {% endif %}
            </div>
        {% endif %}
    </div>

</body>
</html>
